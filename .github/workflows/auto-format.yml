name: 🧹 Python Code Quality

on:
  push:
    branches: [main, develop]
    # Avoid re-running just because the bot pushed formatting changes
    # (still runs if code files change again later)
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "LICENSE"
  pull_request:
    branches: [main, develop]

# Prevent multiple runs fighting to push to the same branch at the same time
concurrency:
  group: code-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  format-lint:
    name: Format + Lint (Black, isort, Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -------------------------------------------------
      # Checkout
      # -------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------
      # Setup Python
      # -------------------------------------------------
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # -------------------------------------------------
      # Install Tools
      # -------------------------------------------------
      - name: 📦 Install Formatting & Lint Tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort ruff

      # -------------------------------------------------
      # Run Formatters
      # -------------------------------------------------
      - name: 🧹 Format Code (Black + isort)
        run: |
          black .
          isort .

      # -------------------------------------------------
      # Auto-commit formatting changes (push runs only)
      # -------------------------------------------------
      - name: 💾 Commit & Push Formatting Changes
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Only operate on expected branches
          if [[ "${BRANCH_NAME}" != "main" && "${BRANCH_NAME}" != "develop" ]]; then
            echo "Not a target branch (${BRANCH_NAME}). Skipping auto-commit."
            exit 0
          fi

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No formatting changes needed"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "style: auto-format code with black & isort"

          # Sync with remote to avoid non-fast-forward errors
          git fetch origin "${BRANCH_NAME}"
          git rebase "origin/${BRANCH_NAME}"

          # Push with retry (handles race conditions)
          for i in 1 2 3; do
            if git push origin "HEAD:${BRANCH_NAME}"; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Push failed (attempt $i). Re-syncing and retrying..."
            git fetch origin "${BRANCH_NAME}"
            git rebase "origin/${BRANCH_NAME}"
            sleep 2
          done

          echo "Failed to push after retries."
          exit 1

      # -------------------------------------------------
      # Ensure workspace is clean for lint checks
      # (On pull_request runs, the push step won't execute, so formatting
      # changes remain unstaged and we should fail fast to show diffs.)
      # -------------------------------------------------
      - name: ✅ Check formatting is clean (PRs)
        if: github.event_name == 'pull_request'
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Formatting changes detected. Please run black + isort locally."
            echo ""
            echo "Diff:"
            git --no-pager diff
            exit 1
          fi
          echo "Formatting OK."

      # -------------------------------------------------
      # Ruff (lint)
      # -------------------------------------------------
      - name: 🔍 Ruff Lint
        run: |
          ruff check .

      # -------------------------------------------------
      # Ruff (format) optional check (kept non-blocking by default)
      # Uncomment if you want Ruff-format enforcement later.
      # -------------------------------------------------
      # - name: 🧾 Ruff Format Check
      #   run: |
      #     ruff format --check .

      # -------------------------------------------------
      # (Optional) Quick sanity: Python syntax compile
      # -------------------------------------------------
      - name: 🧪 Compile Python files
        run: |
          python -m compileall -q .
